version: 1

cases:
  - name: help mentions important flags
    run:
      tool: fixture
      args:
        - --helpish
    stdout:
      contains:
        - "Usage:"
        - "--echo-stdin"
        - "--write-file=PATH"
    stderr:
      empty: true

  - name: stdin and file artifact test
    steps:
      - name: write-config
        write:
          path: "{tmp}/config.json"
          text: |
            {"name": "fixture"}

      - name: produce
        run:
          tool: fixture
          args:
            - --echo-stdin
            - "--write-file={tmp}/artifact.txt"
          stdin:
            file: "{srcdir}/input.txt"
        stdout:
          contains:
            - "stdin:"
            - "payload from input file"
        stderr:
          empty: true
        files:
          - path: "{tmp}/artifact.txt"
            non_empty: true
          - path: "{tmp}/config.json"
            non_empty: true

      - name: consume
        run:
          tool: fixture
          args:
            - "--cat-file={tmp}/artifact.txt"
        stdout:
          contains:
            - "fixture artifact"
        stderr:
          empty: true

  - name: expected failure test
    run:
      tool: fixture
      args:
        - --fail
    exit:
      nonzero: true
    stderr:
      contains:
        - "intentional fixture failure"
