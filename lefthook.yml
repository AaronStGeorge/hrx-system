# Root lefthook configuration delegates policy to the repository presubmit
# script. Lefthook owns the Git hook event and manual run groups; presubmit.py
# owns profiles such as default, paranoid, and ci.

min_version: 2.1.9

pre-commit:
  fail_on_changes: always
  commands:
    presubmit:
      run: python build_tools/lefthook/presubmit.py --check {staged_files}

fix:
  commands:
    fix:
      run: python build_tools/lefthook/presubmit.py --fix --staged --hygiene

presubmit:
  commands:
    presubmit:
      run: python build_tools/lefthook/presubmit.py --profile paranoid {staged_files}

check:
  commands:
    check:
      run: python build_tools/lefthook/presubmit.py --profile ci
