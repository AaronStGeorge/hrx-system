name: CI CMake Linux

on:
  workflow_dispatch:
    inputs:
      release_type:
        type: choice
        options:
          - nightly
          - dev
          - prerelease
        default: nightly
      run_id:
        type: string
        description: "TheRock artifact run id. Empty means latest complete Linux run."
        default: ""
      artifact_set:
        type: choice
        options:
          - core
          - core-with-llvm-dev
          - core-with-upstream-hip
        default: core
      test_gpu:
        type: boolean
        default: false
  pull_request:
  push:
    branches:
      - main
      - main-staging

permissions:
  contents: read

jobs:
  normal:
    name: CMake Linux CI
    uses: ./.github/workflows/build_core_linux.yml
    permissions:
      contents: read
    with:
      name: Default
      release_type: ${{ inputs.release_type || 'nightly' }}
      run_id: ${{ inputs.run_id || '' }}
      artifact_set: ${{ inputs.artifact_set || 'core' }}
      build_type: RelWithDebInfo
      sanitizer: none
      test_gpu: ${{ inputs.test_gpu || false }}
      package: true
