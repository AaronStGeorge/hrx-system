name: CI CMake Linux

on:
  workflow_dispatch:
    inputs:
      release_type:
        type: choice
        options:
          - nightly
          - dev
          - prerelease
        default: nightly
      run_id:
        type: string
        description: "TheRock artifact run id. Empty means latest complete Linux run."
        default: ""
      artifact_set:
        type: choice
        options:
          - core
          - core-with-llvm-dev
          - core-with-upstream-hip
        default: core
      test_gpu:
        type: boolean
        default: false
  pull_request:
  push:
    branches:
      - main
      - main-staging

permissions:
  contents: read

jobs:
  cmake_linux:
    name: Linux / CMake / CI
    strategy:
      fail-fast: false
      matrix:
        include:
          - variant: Default
            sanitizer: none
            assertions: false
            run_tests: true
            ctest_exclude_regex: ""
            package: true
          - variant: ASAN
            sanitizer: asan
            assertions: true
            run_tests: true
            ctest_exclude_regex: ""
            package: false
          - variant: TSAN
            sanitizer: tsan
            assertions: true
            run_tests: true
            # TODO(#19): io_uring CTS core_tests hangs under TSAN on the
            # current managed Linux CI runner. Keep this as a CI-only exclusion
            # so local/source coverage remains intact.
            ctest_exclude_regex: "^iree/async/platform/io_uring/cts/core_tests$"
            package: false
          - variant: MSAN
            sanitizer: msan
            assertions: true
            # TODO(#20): MSAN builds/install are useful, but installed tests
            # need an instrumented host C++ runtime/test dependency stack.
            run_tests: false
            ctest_exclude_regex: ""
            package: false
          - variant: UBSAN
            sanitizer: ubsan
            assertions: true
            run_tests: true
            ctest_exclude_regex: ""
            package: false
    uses: ./.github/workflows/build_core_linux.yml
    permissions:
      contents: read
    with:
      name: ${{ matrix.variant }}
      release_type: ${{ inputs.release_type || 'nightly' }}
      run_id: ${{ inputs.run_id || '' }}
      artifact_set: ${{ inputs.artifact_set || 'core' }}
      build_type: RelWithDebInfo
      sanitizer: ${{ matrix.sanitizer }}
      assertions: ${{ matrix.assertions }}
      test_gpu: ${{ inputs.test_gpu || false }}
      run_tests: ${{ matrix.run_tests }}
      ctest_exclude_regex: ${{ matrix.ctest_exclude_regex }}
      package: ${{ matrix.package }}

  summary:
    name: Linux / CMake / CI / Summary
    needs: cmake_linux
    if: ${{ always() }}
    runs-on: ubuntu-24.04
    steps:
      - name: Check matrix result
        run: |
          result="${{ needs.cmake_linux.result }}"
          echo "cmake_linux result: ${result}"
          if [[ "${result}" != "success" ]]; then
            exit 1
          fi
