name: CI IREE Bazel

on:
  workflow_dispatch:
  pull_request:
    paths:
      - ".bazelrc"
      - ".bazelrc.configured"
      - ".github/scripts/**"
      - ".github/workflows/ci_iree_bazel.yml"
      - "BUILD.bazel"
      - "BUILDING.md"
      - "MODULE.bazel"
      - "MODULE.bazel.lock"
      - "dev.py"
      - "requirements-analysis.in"
      - "requirements-analysis.lock.txt"
      - "requirements-dev.in"
      - "requirements-dev.lock.txt"
      - "build_tools/**"
      - "runtime/**"
      - "loom/**"
      - "third_party/**"
      - "tools/**"
  push:
    branches:
      - main
      - main-staging
    paths:
      - ".bazelrc"
      - ".bazelrc.configured"
      - ".github/scripts/**"
      - ".github/workflows/ci_iree_bazel.yml"
      - "BUILD.bazel"
      - "BUILDING.md"
      - "MODULE.bazel"
      - "MODULE.bazel.lock"
      - "dev.py"
      - "requirements-analysis.in"
      - "requirements-analysis.lock.txt"
      - "requirements-dev.in"
      - "requirements-dev.lock.txt"
      - "build_tools/**"
      - "runtime/**"
      - "loom/**"
      - "third_party/**"
      - "tools/**"

permissions:
  contents: read

jobs:
  linux_bazel_cpu:
    name: ${{ matrix.name }}
    runs-on: aws-linux-scale-rocm-prod
    timeout-minutes: 45
    container:
      image: ghcr.io/rocm/therock_build_manylinux_x86_64@sha256:702a5133851e6d1daf1207d2c9fbb01c2667914a5b6dc5a01faeb3ce66ea6421
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: Linux / CPU
            command: iree-bazel-cpu
          - name: Linux / CPU / ASAN
            command: iree-bazel-cpu-asan
          - name: Linux / CPU / MSAN
            command: iree-bazel-cpu-msan
          - name: Linux / CPU / TSAN
            command: iree-bazel-cpu-tsan
          - name: Linux / CPU / UBSAN
            command: iree-bazel-cpu-ubsan
    env:
      HRX_ARTIFACT_SET: core
      HRX_DOWNLOAD_CACHE_DIR: ${{ github.workspace }}/build/iree-bazel/downloads
      HRX_OUTPUT_DIR: ${{ github.workspace }}/build/iree-bazel
      HRX_PYTHON: ${{ github.workspace }}/build/iree-bazel/python/bin/python3
      HRX_RELEASE_TYPE: nightly
      HRX_ROCM_ROOT: ${{ github.workspace }}/build/iree-bazel/rocm-root
      PIP_CACHE_DIR: ${{ github.workspace }}/build/iree-bazel/caches/pip
    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Adjust git config
        run: git config --global --add safe.directory "$PWD"

      - name: Fetch ROCm toolchain
        run: bash .github/scripts/fetch_rocm_toolchain.sh

      - name: Install developer tools
        run: |
          python3 --version
          python3 dev.py bazel setup --venv
          echo "$PWD/.venv/bin" >> "$GITHUB_PATH"

      - name: Check tool versions
        run: |
          bazel --version
          clang --version
          "$CC" --version
          test -d "${HRX_ROCM_ROOT}/include"

      - name: Run IREE Bazel CI
        run: |
          echo "python3 build_tools/devtools/ci.py ${{ matrix.command }} --keep-going"
          python3 build_tools/devtools/ci.py ${{ matrix.command }} --keep-going

  linux_bazel_vulkan:
    name: ${{ matrix.name }}
    runs-on: gpu_navi4x
    timeout-minutes: 45
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: Linux / Vulkan
            command: iree-bazel-vulkan
          - name: Linux / Vulkan / Sanitizers
            command: iree-bazel-vulkan-sanitizers
    env:
      HRX_ARTIFACT_SET: core
      HRX_DOWNLOAD_CACHE_DIR: ${{ github.workspace }}/build/iree-bazel-vulkan/downloads
      HRX_OUTPUT_DIR: ${{ github.workspace }}/build/iree-bazel-vulkan
      HRX_PYTHON: ${{ github.workspace }}/build/iree-bazel-vulkan/python/bin/python3
      HRX_RELEASE_TYPE: nightly
      HRX_ROCM_ROOT: ${{ github.workspace }}/build/iree-bazel-vulkan/rocm-root
      PIP_CACHE_DIR: ${{ github.workspace }}/build/iree-bazel-vulkan/caches/pip
    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Adjust git config
        run: git config --global --add safe.directory "$PWD"

      - name: Fetch ROCm toolchain
        run: bash .github/scripts/fetch_rocm_toolchain.sh

      - name: Check Vulkan hardware environment
        run: bash .github/scripts/check_vulkan_hardware_environment.sh

      - name: Install Bazel host tools
        run: |
          mkdir -p build/ci/iree-bazel-vulkan/bin
          python3 --version
          python3 build_tools/devtools/install.py --group bazel \
            --bin-dir build/ci/iree-bazel-vulkan/bin
          python3 build_tools/devtools/install.py --group bazel \
            --bin-dir build/ci/iree-bazel-vulkan/bin --check
          echo "$PWD/build/ci/iree-bazel-vulkan/bin" >> "$GITHUB_PATH"

      - name: Check tool versions
        run: |
          bazel --version
          clang --version
          "$CC" --version
          test -d "${HRX_ROCM_ROOT}/include"

      - name: Run IREE Bazel CI
        run: |
          echo "python3 build_tools/devtools/ci.py ${{ matrix.command }} --keep-going"
          python3 build_tools/devtools/ci.py ${{ matrix.command }} --keep-going

  linux_bazel_amdgpu:
    name: ${{ matrix.name }}
    runs-on: linux-gfx942-1gpu-core42-ossci-rocm
    timeout-minutes: 60
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: Linux / AMDGPU
            command: iree-bazel-amdgpu
          - name: Linux / AMDGPU / Sanitizers
            command: iree-bazel-amdgpu-sanitizers
    env:
      HRX_ARTIFACT_SET: core
      HRX_DOWNLOAD_CACHE_DIR: ${{ github.workspace }}/build/iree-bazel-gpu/downloads
      HRX_OUTPUT_DIR: ${{ github.workspace }}/build/iree-bazel-gpu
      HRX_PYTHON: ${{ github.workspace }}/build/iree-bazel-gpu/python/bin/python3
      HRX_RELEASE_TYPE: nightly
      HRX_ROCM_ROOT: ${{ github.workspace }}/build/iree-bazel-gpu/rocm-root
      PIP_CACHE_DIR: ${{ github.workspace }}/build/iree-bazel-gpu/caches/pip
      ROCR_VISIBLE_DEVICES: "0"
    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Adjust git config
        run: git config --global --add safe.directory "$PWD"

      - name: Fetch ROCm toolchain
        run: bash .github/scripts/fetch_rocm_toolchain.sh

      - name: Install developer tools
        run: |
          python3 --version
          python3 dev.py bazel setup --venv
          echo "$PWD/.venv/bin" >> "$GITHUB_PATH"

      - name: Check tool versions
        run: |
          bazel --version
          clang --version
          "$CC" --version
          test -d "${HRX_ROCM_ROOT}/include"

      - name: Report ROCm environment
        run: bash .github/scripts/check_rocm_environment.sh

      - name: Run IREE Bazel CI
        run: |
          echo "python3 build_tools/devtools/ci.py ${{ matrix.command }} --keep-going"
          python3 build_tools/devtools/ci.py ${{ matrix.command }} --keep-going
