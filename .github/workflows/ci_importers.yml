name: CI Importers

on:
  workflow_dispatch:
  pull_request:
    paths:
      - ".bazelrc"
      - ".bazelrc.configured"
      - ".github/scripts/**"
      - ".github/workflows/ci_importers.yml"
      - "dev.py"
      - "requirements-analysis.lock.txt"
      - "requirements-dev.lock.txt"
      - "requirements-importers-*.in"
      - "requirements-importers-*.lock.txt"
      - "build_tools/devtools/**"
      - "loom/config/**"
      - "loom/py/loom/importers/**"
  push:
    branches:
      - main
      - main-staging
    paths:
      - ".bazelrc"
      - ".bazelrc.configured"
      - ".github/scripts/**"
      - ".github/workflows/ci_importers.yml"
      - "dev.py"
      - "requirements-analysis.lock.txt"
      - "requirements-dev.lock.txt"
      - "requirements-importers-*.in"
      - "requirements-importers-*.lock.txt"
      - "build_tools/devtools/**"
      - "loom/config/**"
      - "loom/py/loom/importers/**"

permissions:
  contents: read

jobs:
  linux_importer:
    name: ${{ matrix.name }}
    runs-on: aws-linux-scale-rocm-prod
    timeout-minutes: 45
    container:
      image: ghcr.io/rocm/therock_build_manylinux_x86_64@sha256:702a5133851e6d1daf1207d2c9fbb01c2667914a5b6dc5a01faeb3ce66ea6421
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: Linux / TileLang
            profile: tilelang
            command: iree-importers-tilelang
            lock_file: requirements-importers-tilelang.lock.txt
    env:
      HRX_ARTIFACT_SET: core
      HRX_DOWNLOAD_CACHE_DIR: ${{ github.workspace }}/build/importers/downloads
      HRX_OUTPUT_DIR: ${{ github.workspace }}/build/importers
      HRX_PYTHON: ${{ github.workspace }}/build/importers/python/bin/python3
      HRX_RELEASE_TYPE: nightly
      HRX_ROCM_ROOT: ${{ github.workspace }}/build/importers/rocm-root
      IMPORTER_COMMAND: ${{ matrix.command }}
      IMPORTER_LOCK_FILE: ${{ matrix.lock_file }}
      IMPORTER_PROFILE: ${{ matrix.profile }}
      PIP_CACHE_DIR: ${{ github.workspace }}/build/importers/caches/pip

    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Adjust git config
        run: git config --global --add safe.directory "$PWD"

      - name: Compute importer cache key
        id: importer-cache
        run: |
          python3 - <<'PY' >> "${GITHUB_OUTPUT}"
          import hashlib
          import os
          import platform
          import sys

          profile = os.environ["IMPORTER_PROFILE"]
          runner_os = os.environ.get("RUNNER_OS") or platform.system()
          runner_arch = os.environ.get("RUNNER_ARCH") or platform.machine()
          python_version = f"{sys.version_info.major}.{sys.version_info.minor}"
          digest = hashlib.sha256()
          for path in (
              os.environ["IMPORTER_LOCK_FILE"],
              "requirements-dev.lock.txt",
              "requirements-analysis.lock.txt",
          ):
              digest.update(path.encode("utf-8"))
              with open(path, "rb") as input_file:
                  digest.update(input_file.read())
          prefix = f"importers-{profile}-{runner_os}-{runner_arch}-python-{python_version}"
          print(f"key={prefix}-{digest.hexdigest()}")
          print(f"restore-key={prefix}-")
          print(f"python-version={python_version}")
          PY

      - name: Cache Python package downloads
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4.3.0
        with:
          path: ${{ env.PIP_CACHE_DIR }}
          key: ${{ steps.importer-cache.outputs.key }}
          restore-keys: |
            ${{ steps.importer-cache.outputs.restore-key }}

      - name: Fetch ROCm toolchain
        run: bash .github/scripts/fetch_rocm_toolchain.sh

      - name: Install developer tools
        run: |
          python3 --version
          python3 dev.py bazel setup --venv
          python3 dev.py cmake setup --venv
          echo "$PWD/.venv/bin" >> "${GITHUB_PATH}"

      - name: Check tool versions
        run: |
          bazel --version
          cmake --version
          ctest --version
          ninja --version
          clang --version
          "${CC}" --version
          test -d "${HRX_ROCM_ROOT}/include"
          echo "Importer profile: ${IMPORTER_PROFILE}"
          echo "Importer lock: ${IMPORTER_LOCK_FILE}"
          echo "Python cache version: ${{ steps.importer-cache.outputs.python-version }}"

      - name: Run importer CI
        run: |
          echo "python3 build_tools/devtools/ci.py ${IMPORTER_COMMAND} --keep-going"
          python3 build_tools/devtools/ci.py "${IMPORTER_COMMAND}" --keep-going
