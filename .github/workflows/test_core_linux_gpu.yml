name: Test CMake Linux GPU

on:
  workflow_call:
    inputs:
      name:
        type: string
        default: Linux / CMake / GPU gfx942
      runner_label:
        type: string
        default: linux-gfx942-1gpu-core42-ossci-rocm
      artifact_run_id:
        type: string
        default: ""
      device:
        type: string
        default: gpu:0
      ctest_regex:
        type: string
        default: ""
      ctest_exclude_regex:
        type: string
        default: ""
      ctest_label_regex:
        type: string
        default: runtime-resource=amd-gpu
      ctest_label_exclude_regex:
        type: string
        default: ""
      ctest_parallelism:
        type: number
        default: 1
      experimental:
        type: boolean
        default: false
  workflow_dispatch:
    inputs:
      artifact_run_id:
        type: string
        description: "GitHub Actions run id containing HRX package artifacts. Empty means this workflow run."
        default: ""
      runner_label:
        type: string
        description: "GitHub Actions runner label."
        default: linux-gfx942-1gpu-core42-ossci-rocm
      device:
        type: string
        description: "libhrx CTS device spec."
        default: gpu:0
      ctest_regex:
        type: string
        description: "Optional CTest name regex for installed GPU tests."
        default: ""
      ctest_exclude_regex:
        type: string
        description: "Optional CTest name exclusion regex for installed GPU tests."
        default: ""
      ctest_label_regex:
        type: string
        description: "CTest label regex for GPU installed tests."
        default: runtime-resource=amd-gpu
      ctest_label_exclude_regex:
        type: string
        description: "CTest label exclusion regex."
        default: ""
      ctest_parallelism:
        type: number
        description: "CTest parallelism on the GPU runner."
        default: 1
      experimental:
        type: boolean
        description: "Allow installed GPU tests to fail without failing the workflow."
        default: false

permissions:
  actions: read
  contents: read

jobs:
  test_core_linux_gpu:
    name: ${{ inputs.name || 'Linux / CMake / GPU gfx942' }}
    runs-on: ${{ inputs.runner_label || 'linux-gfx942-1gpu-core42-ossci-rocm' }}
    timeout-minutes: 20
    env:
      HRX_OUTPUT_DIR: ${{ github.workspace }}/build/linux-gpu
      HRX_ARTIFACT_DOWNLOAD_DIR: ${{ github.workspace }}/build/linux-gpu/artifacts
      HRX_PUBLIC_INSTALL_DIR: ${{ github.workspace }}/build/linux-gpu/install/public
      HRX_PUBLIC_DEPS_DIR: ${{ github.workspace }}/build/linux-gpu/install/public-deps
      HRX_TESTS_INSTALL_DIR: ${{ github.workspace }}/build/linux-gpu/install/tests
      HRX_COMPOSED_INSTALL_DIR: ${{ github.workspace }}/build/linux-gpu/install/composed
      HRX_PREPARE_PUBLIC_DEPS: "false"
      HRX_PACKAGE_SMOKE: "false"
      HRX_TEST_GPU: "true"
      HRX_CTS_DEVICE: ${{ inputs.device || 'gpu:0' }}
      HRX_CTEST_REGEX: ${{ inputs.ctest_regex }}
      HRX_CTEST_EXCLUDE_REGEX: ${{ inputs.ctest_exclude_regex }}
      HRX_CTEST_LABEL_REGEX: ${{ inputs.ctest_label_regex }}
      HRX_CTEST_LABEL_EXCLUDE_REGEX: ${{ inputs.ctest_label_exclude_regex }}
      HRX_CTEST_PARALLELISM: ${{ inputs.ctest_parallelism || 1 }}
      HRX_TEST_TMPDIR: ${{ github.workspace }}/build/linux-gpu/test-tmp
      HRX_PYTHON: ${{ github.workspace }}/build/linux-gpu/python/bin/python3
      PIP_CACHE_DIR: ${{ github.workspace }}/build/linux-gpu/caches/pip
    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Adjust git config
        run: git config --global --add safe.directory "$PWD"

      - name: Install Python dependencies
        run: |
          python3 --version
          mkdir -p "${HRX_OUTPUT_DIR}"
          python3 -m venv "${HRX_OUTPUT_DIR}/python"
          "${HRX_PYTHON}" -m pip install --upgrade pip cmake==3.31.6 zstandard
          echo "${HRX_OUTPUT_DIR}/python/bin" >> "${GITHUB_PATH}"
          "${HRX_OUTPUT_DIR}/python/bin/ctest" --version

      - name: Download public package artifact
        uses: actions/download-artifact@37930b1c2abaa49bbe596cd826c3c89aef350131 # v7.0.0
        with:
          name: hrx-public-linux-x86_64
          path: ${{ env.HRX_ARTIFACT_DOWNLOAD_DIR }}
          run-id: ${{ inputs.artifact_run_id || github.run_id }}
          github-token: ${{ github.token }}

      - name: Download public dependency package artifact
        uses: actions/download-artifact@37930b1c2abaa49bbe596cd826c3c89aef350131 # v7.0.0
        with:
          name: hrx-public-deps-linux-x86_64
          path: ${{ env.HRX_ARTIFACT_DOWNLOAD_DIR }}
          run-id: ${{ inputs.artifact_run_id || github.run_id }}
          github-token: ${{ github.token }}

      - name: Download test package artifact
        uses: actions/download-artifact@37930b1c2abaa49bbe596cd826c3c89aef350131 # v7.0.0
        with:
          name: hrx-tests-linux-x86_64
          path: ${{ env.HRX_ARTIFACT_DOWNLOAD_DIR }}
          run-id: ${{ inputs.artifact_run_id || github.run_id }}
          github-token: ${{ github.token }}

      - name: Extract package artifacts
        run: |
          "${HRX_PYTHON}" build_tools/ci_core_linux.py extract-packages

      - name: Report ROCm environment
        run: |
          export PATH="${HRX_PUBLIC_DEPS_DIR}/bin:${PATH}"
          export LD_LIBRARY_PATH="${HRX_PUBLIC_DEPS_DIR}/lib:${HRX_PUBLIC_DEPS_DIR}/lib/rocm_sysdeps/lib:${LD_LIBRARY_PATH:-}"
          echo "rocminfo path: $(command -v rocminfo)"
          rocminfo || echo "::warning::rocminfo failed; continuing to installed GPU tests"

      - name: Run installed GPU tests
        continue-on-error: ${{ inputs.experimental }}
        run: |
          "${HRX_PYTHON}" build_tools/ci_core_linux.py test
