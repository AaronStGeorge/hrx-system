name: Release CMake Linux Core

on:
  push:
    tags:
      - "v*.*.*"
      - "[0-9]*.[0-9]*.[0-9]*"

permissions:
  actions: read
  contents: read

jobs:
  validate_tag:
    name: Validate tag
    runs-on: ubuntu-24.04
    steps:
      - name: Check semantic version tag
        run: |
          tag="${GITHUB_REF_NAME}"
          if [[ ! "${tag}" =~ ^v?([0-9]|[1-9][0-9]*)\.([0-9]|[1-9][0-9]*)\.([0-9]|[1-9][0-9]*)(-[0-9A-Za-z-]+(\.[0-9A-Za-z-]+)*)?(\+[0-9A-Za-z-]+(\.[0-9A-Za-z-]+)*)?$ ]]; then
            echo "Not a semantic version tag: ${tag}" >&2
            exit 1
          fi

  build_core_linux:
    name: CMake Linux Release
    needs: validate_tag
    uses: ./.github/workflows/build_core_linux.yml
    permissions:
      contents: read
    with:
      name: Release
      release_type: nightly
      artifact_set: core
      build_type: RelWithDebInfo
      sanitizer: none
      test_gpu: false
      ctest_label_exclude_regex: "runtime-resource="
      cmake_options: |
        -DIREE_HAL_AMDGPU_TARGETS=gfx942;gfx1151;gfx1201
      package: true
      package_suffix: ${{ github.ref_name }}

  publish_release:
    name: Publish release
    needs: build_core_linux
    runs-on: ubuntu-24.04
    permissions:
      actions: read
      contents: write
    steps:
      - name: Download public package artifact
        uses: actions/download-artifact@37930b1c2abaa49bbe596cd826c3c89aef350131 # v7.0.0
        with:
          name: hrx-public-linux-x86_64
          path: release-assets

      - name: Download public dependency package artifact
        uses: actions/download-artifact@37930b1c2abaa49bbe596cd826c3c89aef350131 # v7.0.0
        with:
          name: hrx-public-deps-linux-x86_64
          path: release-assets

      - name: Download test package artifact
        uses: actions/download-artifact@37930b1c2abaa49bbe596cd826c3c89aef350131 # v7.0.0
        with:
          name: hrx-tests-linux-x86_64
          path: release-assets

      - name: Download ROCm build environment package artifact
        uses: actions/download-artifact@37930b1c2abaa49bbe596cd826c3c89aef350131 # v7.0.0
        with:
          name: hrx-rocm-buildenv-linux-x86_64
          path: release-assets

      - name: Validate release assets
        run: |
          tag="${GITHUB_REF_NAME}"
          expected_assets=(
            "hrx-public-linux-x86_64-${tag}.tar.zst"
            "hrx-public-linux-x86_64-${tag}.manifest.json"
            "hrx-public-linux-x86_64-env.sh"
            "hrx-public-deps-linux-x86_64-${tag}.tar.zst"
            "hrx-public-deps-linux-x86_64-${tag}.manifest.json"
            "hrx-public-deps-linux-x86_64-env.sh"
            "hrx-tests-linux-x86_64-${tag}.tar.zst"
            "hrx-tests-linux-x86_64-${tag}.manifest.json"
            "hrx-rocm-buildenv-linux-x86_64-${tag}.tar.zst"
            "hrx-rocm-buildenv-linux-x86_64-${tag}.manifest.json"
            "hrx-rocm-buildenv-linux-x86_64-env.sh"
          )

          missing=0
          for asset in "${expected_assets[@]}"; do
            if [[ ! -f "release-assets/${asset}" ]]; then
              echo "Missing release asset: ${asset}" >&2
              missing=1
            fi
          done
          if [[ "${missing}" != 0 ]]; then
            echo "Downloaded assets:" >&2
            find release-assets -maxdepth 2 -type f -print >&2 || true
            exit 1
          fi

          ls -lh release-assets

      - name: Publish GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          tag="${GITHUB_REF_NAME}"
          if [[ ! "${tag}" =~ ^v?([0-9]|[1-9][0-9]*)\.([0-9]|[1-9][0-9]*)\.([0-9]|[1-9][0-9]*)(-[0-9A-Za-z-]+(\.[0-9A-Za-z-]+)*)?(\+[0-9A-Za-z-]+(\.[0-9A-Za-z-]+)*)?$ ]]; then
            echo "Not a semantic version tag: ${tag}" >&2
            exit 1
          fi

          prerelease_args=()
          core_version="${tag#v}"
          core_version="${core_version%%+*}"
          if [[ "${core_version}" == *-* ]]; then
            prerelease_args+=(--prerelease)
          fi

          if gh release view "${tag}" --repo "${GITHUB_REPOSITORY}" >/dev/null 2>&1; then
            gh release upload "${tag}" release-assets/* \
              --repo "${GITHUB_REPOSITORY}" \
              --clobber
          else
            gh release create "${tag}" release-assets/* \
              --repo "${GITHUB_REPOSITORY}" \
              --title "HRX ${tag}" \
              --generate-notes \
              "${prerelease_args[@]}"
          fi
