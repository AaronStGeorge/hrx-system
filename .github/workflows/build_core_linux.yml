name: Build CMake Linux Core

on:
  workflow_call:
    inputs:
      name:
        type: string
        default: Default
      release_type:
        type: string
        default: nightly
      run_id:
        type: string
        default: ""
      artifact_set:
        type: string
        default: core
      build_type:
        type: string
        default: RelWithDebInfo
      sanitizer:
        type: string
        default: none
      cmake_options:
        type: string
        default: ""
      ctest_regex:
        type: string
        default: ""
      test_gpu:
        type: boolean
        default: false
      package:
        type: boolean
        default: true
      package_suffix:
        type: string
        default: ""

permissions:
  contents: read

jobs:
  build_core_linux:
    name: ${{ inputs.name }}
    runs-on: aws-linux-scale-rocm-prod
    timeout-minutes: 30
    container:
      image: ghcr.io/rocm/therock_build_manylinux_x86_64@sha256:702a5133851e6d1daf1207d2c9fbb01c2667914a5b6dc5a01faeb3ce66ea6421
    env:
      HRX_OUTPUT_DIR: ${{ github.workspace }}/build/linux
      HRX_RELEASE_TYPE: ${{ inputs.release_type }}
      HRX_RUN_ID: ${{ inputs.run_id }}
      HRX_ARTIFACT_SET: ${{ inputs.artifact_set }}
      HRX_ROCM_ROOT: ${{ github.workspace }}/build/linux/rocm-root
      HRX_DOWNLOAD_CACHE_DIR: ${{ github.workspace }}/build/linux/downloads
      HRX_BUILD_DIR: ${{ github.workspace }}/build/linux/build/hrx-core
      HRX_PUBLIC_INSTALL_DIR: ${{ github.workspace }}/build/linux/install/public
      HRX_TESTS_INSTALL_DIR: ${{ github.workspace }}/build/linux/install/tests
      HRX_PUBLIC_DEPS_DIR: ${{ github.workspace }}/build/linux/install/public-deps
      HRX_COMPOSED_INSTALL_DIR: ${{ github.workspace }}/build/linux/install/composed
      HRX_PACKAGE_SMOKE_BUILD_DIR: ${{ github.workspace }}/build/linux/build/package-smoke
      HRX_PACKAGE_OUTPUT_DIR: ${{ github.workspace }}/build/linux/dist
      HRX_BUILD_TYPE: ${{ inputs.build_type }}
      HRX_SANITIZER: ${{ inputs.sanitizer }}
      HRX_CMAKE_OPTIONS: ${{ inputs.cmake_options }}
      HRX_CTEST_REGEX: ${{ inputs.ctest_regex }}
      HRX_TEST_GPU: ${{ inputs.test_gpu }}
      HRX_PACKAGE: ${{ inputs.package }}
      HRX_PACKAGE_SUFFIX: ${{ inputs.package_suffix }}
      CCACHE_DIR: ${{ github.workspace }}/build/linux/caches/ccache
      PIP_CACHE_DIR: ${{ github.workspace }}/build/linux/caches/pip
    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Adjust git config
        run: git config --global --add safe.directory "$PWD"

      - name: Install Python dependencies
        run: python3 -m pip install --upgrade boto3 zstandard

      - name: Fetch ROCm artifacts
        run: python3 build_tools/ci_core_linux.py fetch-rocm

      - name: Configure, build, and install
        run: python3 build_tools/ci_core_linux.py build

      - name: Run installed tests
        run: python3 build_tools/ci_core_linux.py test

      - name: Package
        if: ${{ inputs.package }}
        run: python3 build_tools/ci_core_linux.py package

      - name: Upload public package
        if: ${{ inputs.package }}
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: hrx-public-linux-x86_64
          path: |
            build/linux/dist/hrx-public-linux-x86_64-*.tar.zst
            build/linux/dist/hrx-public-linux-x86_64-*.manifest.json
            build/linux/dist/hrx-public-linux-x86_64-env.sh
          if-no-files-found: error

      - name: Upload public dependency package
        if: ${{ inputs.package }}
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: hrx-public-deps-linux-x86_64
          path: |
            build/linux/dist/hrx-public-deps-linux-x86_64-*.tar.zst
            build/linux/dist/hrx-public-deps-linux-x86_64-*.manifest.json
            build/linux/dist/hrx-public-deps-linux-x86_64-env.sh
          if-no-files-found: error

      - name: Upload test package
        if: ${{ inputs.package }}
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: hrx-tests-linux-x86_64
          path: |
            build/linux/dist/hrx-tests-linux-x86_64-*.tar.zst
            build/linux/dist/hrx-tests-linux-x86_64-*.manifest.json
          if-no-files-found: error

      - name: Upload ROCm build environment package
        if: ${{ inputs.package }}
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: hrx-rocm-buildenv-linux-x86_64
          path: |
            build/linux/dist/hrx-rocm-buildenv-linux-x86_64-*.tar.zst
            build/linux/dist/hrx-rocm-buildenv-linux-x86_64-*.manifest.json
            build/linux/dist/hrx-rocm-buildenv-linux-x86_64-env.sh
          if-no-files-found: error
