version: 1

cases:
  - name: assemble file input
    steps:
      - name: write-source
        write:
          path: "{tmp}/module.vmasm"
          text: |
            vm.module @iree_as_module_test version 0
            vm.export @add_i32
            vm.func @add_i32(%i0: i32, %i1: i32) -> (i32) {
            ^bb0:
              %i2 = vm.add.i32 %i0, %i1
              vm.return %i2
            }

      - name: assemble
        run:
          tool: iree-as-module
          args:
            - "--output={tmp}/module.vmfb"
            - "{tmp}/module.vmasm"
        stdout:
          empty: true
        stderr:
          empty: true
        files:
          - path: "{tmp}/module.vmfb"
            non_empty: true

  - name: assemble stdin input
    run:
      tool: iree-as-module
      args:
        - "--output={tmp}/stdin.vmfb"
        - "-"
      stdin:
        text: |
          vm.module @iree_as_module_stdin_test version 0
          vm.func @empty() -> () {
          ^bb0:
            vm.return
          }
    stdout:
      empty: true
    stderr:
      empty: true
    files:
      - path: "{tmp}/stdin.vmfb"
        non_empty: true

  - name: requires output path
    run:
      tool: iree-as-module
      args:
        - "{tmp}/missing-output.vmasm"
    exit:
      nonzero: true
    stdout:
      empty: true
    stderr:
      contains:
        - "expected one input file and --output"
